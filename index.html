<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NusantaraMall | Toko Baju</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <span class="brand-logo">NM</span>
      <div>
        <h1>NusantaraMall</h1>
        <p>Web toko baju Indonesia</p>
      </div>
    </div>
    <div class="cart-summary" id="cart-summary">
      <button id="cart-toggle">Keranjang (<span id="cart-count">0</span>)</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div>
        <h2>Fashion lokal, gaya global</h2>
        <p>Temukan koleksi baju, jaket, dan aksesoris untuk semua momen.</p>
      </div>
      <div class="search-box">
        <input id="search-input" type="search" placeholder="Cari produk..." />
      </div>
    </section>

    <section class="products" id="product-grid">
      <!-- Product cards generated by JavaScript -->
    </section>
  </main>

  <aside class="cart-panel" id="cart-panel">
    <div class="cart-header">
      <h3>Keranjang Belanja</h3>
      <button id="cart-close" aria-label="Tutup">×</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
      <div>
        <span>Total</span>
        <strong id="cart-total">Rp 0</strong>
      </div>
      <button id="checkout-button" class="btn btn-primary">Checkout</button>
    </div>
  </aside>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h3>Checkout Sukses</h3>
      <p>Terima kasih. Pesanan Anda sudah masuk ke sistem.</p>
      <button id="modal-close" class="btn btn-secondary">Tutup</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
