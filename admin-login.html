<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login Admin - NusantaraMall</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <span class="brand-logo">NM</span>
      <div>
        <h1>Login Admin</h1>
        <p class="small">Masuk untuk mengelola pesanan NusantaraMall.</p>
      </div>
    </div>
  </header>

  <main>
    <section class="hero" style="padding-top: 3rem; padding-bottom: 2rem;">
      <div>
        <h2>Masuk ke Dashboard Admin</h2>
        <p>Silakan masuk dengan akun administrator untuk mengakses panel admin.</p>
      </div>
    </section>

    <section class="footer-cta" style="margin: 1rem 2rem 2rem; padding: 2rem; border-radius: 28px;">
      <form id="admin-login-form" style="display:grid;gap:1rem;">
        <label>
          Username
          <input type="text" name="username" placeholder="Masukkan username" required />
        </label>
        <label>
          Password
          <input type="password" name="password" placeholder="Masukkan password" required />
        </label>
        <div id="admin-login-error" class="small" style="color:#d62828;"></div>
        <button type="submit" class="btn btn-primary">Masuk</button>
      </form>
      <a href="index.html" class="btn btn-secondary">Kembali ke Toko</a>
    </section>
  </main>

  <script src="admin-login.js"></script>
</body>
</html>
