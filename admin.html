<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin - NusantaraMall</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      main{padding:2rem}
      .admin-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
      .admin-card{background:#fff;padding:1.4rem;border-radius:20px;box-shadow:0 10px 30px rgba(15,23,42,0.06);border:1px solid var(--border)}
      .admin-card p{margin:0 0 .5rem;color:var(--muted);font-size:.95rem}
      .admin-card h3{margin:0;font-size:2rem}
      .admin-controls{display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin-bottom:1.5rem}
      .admin-controls input,
      .admin-controls select{flex:1;min-width:220px;padding:.95rem 1rem;border-radius:18px;border:1px solid var(--border);background:#f8fbff;color:var(--text);}
      .admin-orders h2{margin-top:0;margin-bottom:1rem}
      .admin-order-card{background:#fff;border:1px solid #e6eef8;border-radius:22px;padding:1.2rem;margin-bottom:1rem;box-shadow:0 12px 30px rgba(15,23,42,0.06)}
      .admin-order-header{display:flex;justify-content:space-between;gap:1rem;align-items:flex-start;margin-bottom:1rem}
      .admin-order-meta{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem}
      .admin-order-right{color:var(--muted);font-size:.93rem;display:grid;gap:.5rem}
      .admin-status-group{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:flex-end}
      .admin-badge{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem .8rem;border-radius:999px;font-size:.8rem;font-weight:700}
      .admin-badge-status{background:#e6f0ff;color:#1452a6}
      .admin-badge-payment{background:#eef8f3;color:#177b4c}
      .admin-action-row{flex-wrap:wrap}
      .admin-action-row .btn{padding:.75rem .9rem;font-size:.9rem}
      .small{font-size:0.9rem;color:var(--muted)}
      .actions{display:flex;gap:.4rem;flex-wrap:wrap}
      .attachment{max-width:160px;max-height:90px;object-fit:cover;border-radius:6px}
      @media(max-width:760px){.admin-order-meta{grid-template-columns:1fr}.admin-controls{flex-direction:column}}
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="brand"><span class="brand-logo">NM</span><div><h1>Admin NusantaraMall</h1><p class="small">Dashboard sederhana untuk demo</p></div></div>
      <nav class="nav-links">
        <a href="index.html">Kembali ke Toko</a>
      </nav>
    </header>
    <main>
      <section class="footer-cta" style="margin-bottom:1.5rem; padding:1.5rem; border-radius:24px;">
        <div>
          <h2>Panel Admin</h2>
          <p>Kelola pesanan yang tersimpan di localStorage. Setiap perubahan akan langsung terlihat di demo toko.</p>
        </div>
      </section>
      <section class="admin-summary">
        <article class="admin-card">
          <p>Total Pesanan</p>
          <h3 id="total-orders">0</h3>
        </article>
        <article class="admin-card">
          <p>Menunggu Pembayaran</p>
          <h3 id="pending-orders">0</h3>
        </article>
        <article class="admin-card">
          <p>Pesanan Selesai</p>
          <h3 id="completed-orders">0</h3>
        </article>
        <article class="admin-card">
          <p>Pengajuan Retur</p>
          <h3 id="return-requests">0</h3>
        </article>
      </section>
      <section class="admin-controls">
        <input id="admin-search" type="search" placeholder="Cari order ID atau nama pelanggan..." />
        <select id="admin-status-filter">
          <option value="">Semua status</option>
          <option value="AWAITING_COD_COLLECTION">Menunggu COD</option>
          <option value="UNPAID">Belum dibayar</option>
          <option value="AWAITING_PAYMENT">Menunggu Pembayaran</option>
          <option value="PROCESSING">Diproses</option>
          <option value="SHIPPED">Dikirim</option>
          <option value="DELIVERED">Terkirim</option>
          <option value="RETURN_APPROVED">Retur disetujui</option>
          <option value="REJECTED">Retur ditolak</option>
          <option value="COMPLETED">Selesai</option>
        </select>
      </section>
      <section class="admin-orders">
        <h2>Daftar Pesanan</h2>
        <div id="orders-root"></div>
      </section>
    </main>
    <script src="admin.js"></script>
  </body>
</html>
